<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicky News | Premium Link Unlocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --glass: rgba(255, 255, 255, 0.85); 
            --bg: #f2f2f7; 
            --text: #1c1c1e; 
            --green: #28a745; 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Animasi Rasi Bintang Background */
        #bg-light { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: radial-gradient(circle at center, #ffffff 0%, #d1d1d6 100%); 
        }

        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { 
            background: var(--glass); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px; 
            width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Animasi Garis Hidup */
        @keyframes border-glow {
            0% { border-color: var(--ios-blue); box-shadow: 0 0 5px var(--ios-blue); }
            50% { border-color: #5856D6; box-shadow: 0 0 15px #5856D6; }
            100% { border-color: var(--ios-blue); box-shadow: 0 0 5px var(--ios-blue); }
        }

        .task-item { 
            background: #fff; border: 2px solid #e5e5ea; color: var(--text); padding: 18px; margin: 15px 0; 
            border-radius: 20px; display: flex; align-items: center; justify-content: space-between; 
            cursor: pointer; width: 100%; font-weight: 600; opacity: 0.6; pointer-events: none; transition: 0.4s;
        }
        
        .task-item.is-active { 
            opacity: 1; pointer-events: auto; 
            animation: border-glow 2s infinite ease-in-out; 
        }
        
        .task-item.is-done { opacity: 1; background: var(--green); border: none; color: #fff; animation: none; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 15px 5px rgba(255, 77, 77, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }
        .task-item.is-error { border: 2px solid #ff4d4d; opacity: 1; animation: pulse 1.5s infinite; background: #fff0f0; }
        
        .btn-main { background: var(--ios-blue); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; transition: 0.3s; }
        .info-text { font-size: 14px; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="bg-light"></div>
<div class="container">
    <div class="glass-card" id="app"></div>
</div>

<script>
    const mySocials = [
        { n: "Subscribe YT Utama", i: "fab fa-youtube", action: "subscribe" },
        { n: "Subscribe YT Kedua", i: "fab fa-youtube", action: "subscribe" },
        { n: "Follow Instagram", i: "fab fa-instagram", action: "follow" },
        { n: "Follow TikTok", i: "fab fa-tiktok", action: "follow" },
        { n: "Follow Facebook", i: "fab fa-facebook", action: "follow" }
    ];
    const links = [
        "https://youtube.com/@dickynews",
        "https://www.youtube.com/@GODickyNews",
        "https://www.instagram.com/dickynews",
        "https://www.tiktok.com/@dickynewsyt",
        "https://www.facebook.com/dickynews45"
    ];

    const params = new URLSearchParams(window.location.search);
    const app = document.getElementById("app");

    function renderUI() {
        if(!params.get("v")) {
            app.innerHTML = `<h2>LINK GENERATOR</h2><input id="link" style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; margin:10px 0; box-sizing:border-box;" placeholder="Paste URL Tujuan..."> <button class="btn-main" style="display:block; background:var(--text)" onclick="generate()">Generate Link</button><div id="res"></div>`;
        } else {
            app.innerHTML = `<h2>VERIFIKASI</h2><p class="info-text">Selesaikan langkah-langkah di bawah ini untuk membuka link WhatsApp Mod.</p><div id="tasks"></div><button id="finalLink" class="btn-main" onclick="window.location.href=atob(params.get('v'))">AKSES LINK TUJUAN</button>`;
            const tasksContainer = document.getElementById("tasks");
            
            mySocials.forEach((s, idx) => {
                let b = document.createElement("button");
                b.className = "task-item";
                if(idx === 0) b.classList.add("is-active");
                b.innerHTML = `<span><i class="${s.i}" style="margin-right:10px"></i> ${s.n}</span> <i class="fas fa-lock"></i>`;
                
                b.onclick = () => {
                    window.open(links[idx], "_blank");
                    b.disabled = true;
                    let count = 15;
                    let timer = setInterval(() => {
                        b.innerHTML = `Memverifikasi apakah kamu sudah ${s.action}... ${count}s`;
                        if(--count < 0) {
                            clearInterval(timer);
                            if(!b.dataset.fail) {
                                b.dataset.fail = "true";
                                b.classList.add("is-error");
                                b.innerHTML = `Kamu belum ${s.action} :( Silahkan klik tombol ini untuk ${s.action}.`;
                                b.disabled = false;
                            } else {
                                b.classList.remove("is-active", "is-error");
                                b.classList.add("is-done");
                                b.innerHTML = `<span><i class="fas fa-check" style="margin-right:10px"></i> BERHASIL</span>`;
                                
                                let nextBtn = document.querySelectorAll(".task-item")[idx + 1];
                                if(nextBtn) {
                                    nextBtn.classList.add("is-active");
                                } else {
                                    document.getElementById("finalLink").style.display = "block";
                                }
                            }
                        }
                    }, 1000);
                };
                tasksContainer.appendChild(b);
            });
        }
    }

    window.generate = () => { 
        let url = document.getElementById('link').value;
        if(url) document.getElementById('res').innerHTML = `<p style="font-size:12px; margin-top:15px; word-break:break-all;">Link:<br>${window.location.origin + window.location.pathname}?v=${btoa(url)}</p>`;
    };
    renderUI();
</script>
</body>
</html>

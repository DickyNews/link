<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicky News | Premium Link Unlocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.7); --bg: #f2f2f7; --text: #1c1c1e; --yellow: #ffcc00; --green: #28a745; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; }
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; padding: 30px; width: 100%; max-width: 400px; text-align: center; }
        
        .task-item { 
            background: #fff; border: 1px solid #ddd; padding: 15px; margin: 10px 0; 
            border-radius: 15px; display: flex; align-items: center; justify-content: space-between; 
            transition: 0.3s; opacity: 0.5; pointer-events: none;
        }
        .task-item.is-active { opacity: 1; pointer-events: auto; border: 2px solid var(--yellow); cursor: pointer; }
        .task-item.is-done { opacity: 1; background: var(--green); color: white; border: none; }
        
        .btn-main { background: var(--text); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card" id="app"></div>
</div>

<script>
    const mySocials = [
        { n: "Subscribe YT Utama", l: "https://youtube.com/@dickynews" },
        { n: "Subscribe YT Kedua", l: "https://www.youtube.com/@GODickyNews" },
        { n: "Follow Instagram", l: "https://www.instagram.com/dickynews" }
    ];

    const params = new URLSearchParams(window.location.search);
    const app = document.getElementById("app");

    if(!params.get("v")) {
        app.innerHTML = `<h2>GENERATOR</h2><input id="link" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="Paste URL..."> <button class="btn-main" style="display:block" onclick="generate()">Buat Link</button><div id="res"></div>`;
    } else {
        app.innerHTML = `<h2>VERIFIKASI</h2><div id="tasks"></div><button id="finalLink" class="btn-main" onclick="window.location.href=atob(params.get('v'))">AKSES LINK</button>`;
        const tasksContainer = document.getElementById("tasks");
        
        mySocials.forEach((s, idx) => {
            let b = document.createElement("div");
            b.className = "task-item";
            if(idx === 0) b.classList.add("is-active");
            b.innerHTML = `<span>${s.n}</span> <i class="fas fa-lock"></i>`;
            
            b.onclick = () => {
                window.open(s.l, "_blank");
                let timeLeft = 15;
                b.style.pointerEvents = "none";
                
                let timer = setInterval(() => {
                    b.innerHTML = `<span>Menunggu... ${timeLeft}s</span>`;
                    timeLeft--;
                    if(timeLeft < 0) {
                        clearInterval(timer);
                        b.classList.remove("is-active");
                        b.classList.add("is-done");
                        b.innerHTML = `<span><i class="fas fa-check"></i> Selesai</span>`;
                        
                        let next = document.querySelectorAll(".task-item")[idx + 1];
                        if(next) {
                            next.classList.add("is-active");
                        } else {
                            document.getElementById("finalLink").style.display = "block";
                        }
                    }
                }, 1000);
            };
            tasksContainer.appendChild(b);
        });
    }

    function generate() {
        let url = document.getElementById('link').value;
        if(url) document.getElementById('res').innerHTML = `<p>Link: <br>${window.location.origin + window.location.pathname}?v=${btoa(url)}</p>`;
    }
</script>
</body>
</html>

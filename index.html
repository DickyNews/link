<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dicky News | Premium Link Unlocker</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #4285F4; --bg: #121212; --card: #ffffff; --text: #202124; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Roboto', sans-serif; overflow: hidden; }
        
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: var(--card); width: 100%; max-width: 450px; padding: 40px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        
        h2 { font-weight: 500; color: var(--text); margin-bottom: 24px; }
        .task { border: 1px solid #dadce0; padding: 16px 20px; border-radius: 16px; margin-bottom: 14px; display: flex; align-items: center; cursor: pointer; transition: 0.3s; color: var(--text); font-weight: 500; }
        .task:hover { border-color: var(--blue); background: #f8f9fa; }
        
        .btn { background: var(--blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 16px; font-weight: 500; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <div class="card">
        <h2>VERIFIKASI</h2>
        <div id="taskList"></div>
        <button class="btn" id="finalBtn" style="display:none;" onclick="window.location.href=atob(params.get('v'))">AKSES LINK TUJUAN</button>
    </div>
</div>

<script>
    const links = [
        "https://youtube.com/@dickynews",
        "https://www.youtube.com/@GODickyNews",
        "https://www.instagram.com/dickynews",
        "https://www.tiktok.com/@dickynewsyt",
        "https://www.facebook.com/dickynews45"
    ];

    /* ANIMASI BINTANG JATUH (Smooth & Estetik) */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function animate() {
        ctx.fillStyle = 'rgba(18, 18, 18, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if(Math.random() < 0.2) {
            stars.push({ x: Math.random()*canvas.width, y: -10, vx: (Math.random()-0.5)*12, vy: Math.random()*15+5, life: 1 });
        }
        stars.forEach((s, i) => {
            s.x += s.vx; s.y += s.vy; s.life -= 0.01;
            ctx.beginPath(); ctx.strokeStyle = `rgba(255,255,255,${s.life})`;
            ctx.lineWidth = 1.5; ctx.moveTo(s.x, s.y); ctx.lineTo(s.x - s.vx, s.y - s.vy);
            ctx.stroke();
            if(s.life <= 0) stars.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    const tasks = [
        {name: "Subscribe YT Utama", icon: "fab fa-youtube"},
        {name: "Subscribe YT Kedua", icon: "fab fa-youtube"},
        {name: "Follow Instagram", icon: "fab fa-instagram"},
        {name: "Follow TikTok", icon: "fab fa-tiktok"},
        {name: "Follow Facebook", icon: "fab fa-facebook"}
    ];

    const container = document.getElementById("taskList");
    tasks.forEach((t, i) => {
        let div = document.createElement("div");
        div.className = "task";
        div.innerHTML = `<i class="${t.icon}" style="margin-right:12px; font-size:20px;"></i> ${t.name}`;
        div.onclick = () => { window.open(links[i], "_blank"); };
        container.appendChild(div);
    });
</script>
</body>
</html>
